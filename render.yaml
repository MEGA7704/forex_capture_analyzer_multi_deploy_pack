services:
  - type: web
    name: forex-capture-analyzer-pro-render
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: LICENSE_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ADMIN_MASTER_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_LICENSES_PATH
        value: render_data/licenses.json
      - key: GITHUB_EVENTS_PATH
        value: render_data/events.json
